<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://arpuitifnvyyctphobql.supabase.co; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mione Sofa — Live Command Center</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --cream: #F7F3EE;
    --warm-white: #FDFAF7;
    --terracotta: #C4714A;
    --sage: #7A8C7E;
    --deep: #2C2A27;
    --muted: #8A8580;
    --border: #E8E2DA;
    --danger: #D94F4F;
    --gold: #C49A3A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--deep); font-size: 14px; min-height: 100vh; }
  header {
    background: var(--deep); color: var(--cream);
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left span { font-size: 10px; color: var(--terracotta); letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 2px; }
  .header-left h1 { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; }
  .live-dot { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #B0A99F; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #888; }
  .dot.live { background: #4CAF50; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .role-bar { background: var(--warm-white); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 8px; align-items: center; overflow-x: auto; }
  .role-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-right: 4px; white-space: nowrap; }
  .role-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; color: var(--muted); transition: all 0.2s; white-space: nowrap; }
  .role-btn.active { background: var(--deep); color: white; border-color: var(--deep); }
  .stats-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .stat { background: var(--warm-white); padding: 12px 10px; text-align: center; }
  .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; line-height: 1; margin-bottom: 3px; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .orange{color:var(--terracotta)} .green{color:var(--sage)} .gold{color:var(--gold)} .dark{color:var(--deep)}
  .action-bar { padding: 12px 16px; display: flex; gap: 8px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
  .btn-add { background: var(--terracotta); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; }
  .btn-add:hover { background: #B5613D; }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; font-size: 11px; font-family: 'DM Sans', sans-serif; cursor: pointer; color: var(--muted); }
  .filter-btn.active { background: var(--deep); color: white; border-color: var(--deep); }
  .orders-list { padding: 0 16px 100px; }
  .order-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
  .order-card.new { border-left: 3px solid var(--terracotta); }
  .order-card.producing { border-left: 3px solid var(--gold); }
  .order-card.ready { border-left: 3px solid var(--sage); }
  .order-card.delivered { border-left: 3px solid #B0B0B0; opacity: 0.7; }
  .order-card.cancelled { border-left: 3px solid var(--danger); opacity: 0.6; }
  .order-top { padding: 12px 14px; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .order-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .order-product { font-size: 12px; color: var(--terracotta); font-weight: 500; margin-bottom: 3px; }
  .order-meta { font-size: 11px; color: var(--muted); }
  .status-pill { font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 20px; white-space: nowrap; text-transform: uppercase; flex-shrink: 0; }
  .pill-new{background:#FEF3EC;color:var(--terracotta)}
  .pill-producing{background:#FEF9EC;color:var(--gold)}
  .pill-ready{background:#EDF4EE;color:var(--sage)}
  .pill-delivered{background:#F0F0F0;color:#888}
  .pill-cancelled{background:#FDEAEA;color:var(--danger)}
  .order-bottom { border-top: 1px solid var(--border); padding: 8px 14px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
  .order-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); color: var(--muted); }
  .tag.cod{background:#FEF9EC;border-color:#F0D890;color:#8A6A00}
  .tag.sameday{background:#EDF4EE;border-color:#B8D4BB;color:#3A6040}
  .tag.custom{background:#FEF3EC;border-color:#F0C4A8;color:var(--terracotta)}
  .tag.date{background:#F0ECFE;border-color:#C4B8F0;color:#5A4A8A}
  .btn-status { font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--deep); }
  .btn-status:hover { background: var(--deep); color: white; }
  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(44,42,39,0.6); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--warm-white); border-radius: 16px 16px 0 0; width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto; padding: 24px 20px 40px; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
  .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: 'DM Sans', sans-serif; background: white; color: var(--deep); appearance: none; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--terracotta); }
  .form-textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
